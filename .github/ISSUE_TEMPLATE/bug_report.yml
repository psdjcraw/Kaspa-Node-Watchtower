name: Bug report
description: Report a reproducible problem with Kaspa Node Watchtower.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove private hostnames,
        credentials, wallet data, and unsanitized logs before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The watchtower reports an unhealthy state even though...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command and the smallest reproducible setup.
      placeholder: |
        1. Run `.venv/bin/python watchtower.py -c config.json --summary`
        2. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste sanitized output, traceback, or alert text.
      render: shell
    validations:
      required: true
  - type: input
    id: network
    attributes:
      label: Kaspa network
      placeholder: mainnet, testnet 10, simnet, devnet
    validations:
      required: true
  - type: input
    id: kaspad-version
    attributes:
      label: kaspad version
      placeholder: kaspad --version output, commit, or release tag
  - type: dropdown
    id: node-state
    attributes:
      label: Node state
      options:
        - Initial block download
        - Catching up
        - Relay mode
        - Unknown
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Tell us which local checks pass or fail.
      placeholder: |
        - `python3 -m unittest discover -s tests`: pass/fail/not run
        - `scripts/smoke_test.sh`: pass/fail/not run
        - `prometheus/run_rule_tests.sh`: pass/fail/not run
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized config snippets, diagnostics, or environment details.
