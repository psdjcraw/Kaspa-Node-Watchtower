rule_files:
  - kaspa-watchtower-rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_status_ok{job="kaspa-watchtower",node="test"}'
        values: '1+0x20'
      - series: 'kaspa_watchtower_severity_value{job="kaspa-watchtower",node="test"}'
        values: '0+0x20'
      - series: 'kaspa_watchtower_peer_count{job="kaspa-watchtower",node="test"}'
        values: '8+0x20'
      - series: 'kaspa_watchtower_active_peer_count{job="kaspa-watchtower",node="test"}'
        values: '8+0x20'
      - series: 'kaspa_watchtower_relay_blocks_window{job="kaspa-watchtower",node="test"}'
        values: '100+0x20'
      - series: 'kaspa_watchtower_synced{job="kaspa-watchtower",node="test"}'
        values: '1+0x20'
    alert_rule_test:
      - eval_time: 5m
        alertname: KaspaWatchtowerCritical
        exp_alerts: []
      - eval_time: 5m
        alertname: KaspaNodePeerCountLow
        exp_alerts: []
      - eval_time: 5m
        alertname: KaspaNodeActivePeerCountLow
        exp_alerts: []
      - eval_time: 20m
        alertname: KaspaRelayProgressStalled
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_severity_value{job="kaspa-watchtower",node="test"}'
        values: '2+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchtowerCritical
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerCritical
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa watchtower reports critical severity"
              description: "Watchtower severity is critical for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_peer_count{job="kaspa-watchtower",node="test"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaNodePeerCountLow
        exp_alerts:
          - exp_labels:
              alertname: KaspaNodePeerCountLow
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa node has no connected peers"
              description: "Peer count is below 1 for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_active_peer_count{job="kaspa-watchtower",node="test"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaNodeActivePeerCountLow
        exp_alerts:
          - exp_labels:
              alertname: KaspaNodeActivePeerCountLow
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa node has no active peers"
              description: "Active peer count is below 1 for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_relay_blocks_window{job="kaspa-watchtower",node="test"}'
        values: '0+0x20'
      - series: 'kaspa_watchtower_synced{job="kaspa-watchtower",node="test"}'
        values: '1+0x20'
    alert_rule_test:
      - eval_time: 20m
        alertname: KaspaRelayProgressStalled
        exp_alerts:
          - exp_labels:
              alertname: KaspaRelayProgressStalled
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa relay block progress stalled"
              description: "No relay blocks were observed in the recent watchtower window for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_relay_blocks_window{job="kaspa-watchtower",node="test"}'
        values: '0+0x20'
      - series: 'kaspa_watchtower_synced{job="kaspa-watchtower",node="test"}'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 20m
        alertname: KaspaRelayProgressStalled
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_sync_active{job="kaspa-watchtower",node="test"}'
        values: '1+0x40'
      - series: 'kaspa_watchtower_sync_baseline_available{job="kaspa-watchtower",node="test"}'
        values: '1+0x40'
      - series: 'kaspa_watchtower_sync_daa_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_block_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_header_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
    alert_rule_test:
      - eval_time: 35m
        alertname: KaspaMainnetSyncProgressStalled
        exp_alerts:
          - exp_labels:
              alertname: KaspaMainnetSyncProgressStalled
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa mainnet sync progress stalled"
              description: "Mainnet bootstrap sync counters did not advance for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_sync_active{job="kaspa-watchtower",node="test"}'
        values: '1+0x40'
      - series: 'kaspa_watchtower_sync_baseline_available{job="kaspa-watchtower",node="test"}'
        values: '1+0x40'
      - series: 'kaspa_watchtower_sync_daa_delta{job="kaspa-watchtower",node="test"}'
        values: '10+0x40'
      - series: 'kaspa_watchtower_sync_block_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_header_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
    alert_rule_test:
      - eval_time: 35m
        alertname: KaspaMainnetSyncProgressStalled
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_sync_active{job="kaspa-watchtower",node="test"}'
        values: '1+0x40'
      - series: 'kaspa_watchtower_sync_baseline_available{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_daa_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_block_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
      - series: 'kaspa_watchtower_sync_header_delta{job="kaspa-watchtower",node="test"}'
        values: '0+0x40'
    alert_rule_test:
      - eval_time: 35m
        alertname: KaspaMainnetSyncProgressStalled
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_latest_processed_age_seconds{job="kaspa-watchtower",node="test"}'
        values: '240+0x10'
      - series: 'kaspa_watchtower_synced{job="kaspa-watchtower",node="test"}'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaProcessedStatsStale
        exp_alerts:
          - exp_labels:
              alertname: KaspaProcessedStatsStale
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa processed transaction stats are stale"
              description: "Latest processed block/transaction stats are 240 seconds old for node test; inspect kaspad processed-stats log output and the watchtower runbook."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_latest_processed_age_seconds{job="kaspa-watchtower",node="test"}'
        values: '240+0x10'
      - series: 'kaspa_watchtower_synced{job="kaspa-watchtower",node="test"}'
        values: '0+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaProcessedStatsStale
        exp_alerts: []

  - interval: 1m
    input_series: []
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchtowerExporterDown
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerExporterDown
              job: kaspa-watchtower
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa watchtower metrics are missing"
              description: "Prometheus has not scraped kaspa_watchtower_status_ok for 2 minutes."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_recovery_unavailable_total{job="kaspa-watchtower",node="test"}'
        values: '0 0 1 1 1 1'
    alert_rule_test:
      - eval_time: 5m
        alertname: KaspaWatchtowerRecoveryUnavailable
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerRecoveryUnavailable
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa watchtower recovery was unavailable"
              description: "A recovery request could not run for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_recovery_last_exit_code{job="kaspa-watchtower",node="test"}'
        values: '1+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchtowerRecoveryCommandFailed
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerRecoveryCommandFailed
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa watchtower recovery command failed"
              description: "The latest recovery command returned a non-zero exit code for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_verdict_value{job="kaspa-watchtower",node="test"}'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaWatchtowerMultiNodeWarning
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeWarning
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa watchtower multi-node verdict is warning"
              description: "Multi-node comparison is warning for watchtower node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_verdict_value{job="kaspa-watchtower",node="test"}'
        values: '2+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchtowerMultiNodeCritical
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeCritical
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa watchtower multi-node verdict is critical"
              description: "Multi-node comparison is critical for watchtower node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_risk_nodes{job="kaspa-watchtower",node="test"}'
        values: '1+0x10'
      - series: 'kaspa_watchtower_multi_node_lagging_nodes{job="kaspa-watchtower",node="test"}'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaWatchtowerMultiNodeRiskNodes
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeRiskNodes
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa watchtower multi-node risk nodes detected"
              description: "1 multi-node history nodes have risk flags for watchtower node test."
      - eval_time: 6m
        alertname: KaspaWatchtowerMultiNodeLagging
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeLagging
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa watchtower multi-node lag detected"
              description: "1 multi-node history nodes are lagging for watchtower node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",node="test",history_node="mainnet-b",network="mainnet",flag="no_peers"}'
        values: '1+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchtowerMultiNodeNoPeers
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeNoPeers
              flag: no_peers
              history_node: mainnet-b
              job: kaspa-watchtower
              network: mainnet
              node: test
              service: kaspa-watchtower
              severity: critical
            exp_annotations:
              summary: "Kaspa multi-node comparison found a node with no peers"
              description: "History node mainnet-b on mainnet has no peers."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",node="test",history_node="mainnet-b",network="mainnet",flag="stale_node"}'
        values: '1+0x15'
    alert_rule_test:
      - eval_time: 12m
        alertname: KaspaWatchtowerMultiNodeStale
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeStale
              flag: stale_node
              history_node: mainnet-b
              job: kaspa-watchtower
              network: mainnet
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa multi-node comparison found stale node history"
              description: "History node mainnet-b on mainnet has stale check history."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",node="test",history_node="mainnet-b",network="mainnet",flag="daa_lag"}'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaWatchtowerMultiNodeChainLag
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchtowerMultiNodeChainLag
              flag: daa_lag
              history_node: mainnet-b
              job: kaspa-watchtower
              network: mainnet
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa multi-node comparison found DAA or block lag"
              description: "History node mainnet-b on mainnet is lagging by flag daa_lag."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_indexer_watch_enabled{job="kaspa-watchtower",node="test"}'
        values: '1+0x5'
      - series: 'kaspa_watchtower_watch_readiness_ok{job="kaspa-watchtower",node="test"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaWatchReadinessNotReady
        exp_alerts:
          - exp_labels:
              alertname: KaspaWatchReadinessNotReady
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa watch readiness is not ready"
              description: "Watch readiness is not ready for node test; run make discord-watch-check."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_sdk_subscription_enabled{job="kaspa-watchtower",node="test"}'
        values: '1+0x5'
      - series: 'kaspa_watchtower_sdk_subscription_ok{job="kaspa-watchtower",node="test"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: KaspaSdkSubscriptionUnavailable
        exp_alerts:
          - exp_labels:
              alertname: KaspaSdkSubscriptionUnavailable
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa SDK subscription collector is unavailable"
              description: "Watchtower could not collect SDK subscription events for node test."

  - interval: 1m
    input_series:
      - series: 'kaspa_watchtower_sdk_subscription_enabled{job="kaspa-watchtower",node="test"}'
        values: '1+0x10'
      - series: 'kaspa_watchtower_sdk_subscription_events_total{job="kaspa-watchtower",node="test"}'
        values: '0+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KaspaSdkSubscriptionNoEvents
        exp_alerts:
          - exp_labels:
              alertname: KaspaSdkSubscriptionNoEvents
              job: kaspa-watchtower
              node: test
              service: kaspa-watchtower
              severity: warning
            exp_annotations:
              summary: "Kaspa SDK subscription collector saw no events"
              description: "SDK subscription collector saw no live block, virtual-chain, DAA, or UTXO events for node test."
