groups:
  - name: kaspa-watchtower
    rules:
      - alert: KaspaWatchtowerExporterDown
        expr: absent(kaspa_watchtower_status_ok{job="kaspa-watchtower"})
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower metrics are missing"
          description: "Prometheus has not scraped kaspa_watchtower_status_ok for 2 minutes."

      - alert: KaspaWatchtowerCritical
        expr: kaspa_watchtower_severity_value{job="kaspa-watchtower"} >= 2
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower reports critical severity"
          description: "Watchtower severity is critical for node {{ $labels.node }}."

      - alert: KaspaWatchtowerWarning
        expr: kaspa_watchtower_severity_value{job="kaspa-watchtower"} == 1
        for: 10m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower reports warning severity"
          description: "Watchtower severity is warning for node {{ $labels.node }}."

      - alert: KaspaNodePeerCountLow
        expr: kaspa_watchtower_peer_count{job="kaspa-watchtower"} < 1
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa node has no connected peers"
          description: "Peer count is below 1 for node {{ $labels.node }}."

      - alert: KaspaNodeActivePeerCountLow
        expr: kaspa_watchtower_active_peer_count{job="kaspa-watchtower"} < 1
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa node has no active peers"
          description: "Active peer count is below 1 for node {{ $labels.node }}."

      - alert: KaspaRelayProgressStalled
        expr: (kaspa_watchtower_relay_blocks_window{job="kaspa-watchtower"} < 1) and on(job,node) (kaspa_watchtower_synced{job="kaspa-watchtower"} == 1)
        for: 15m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa relay block progress stalled"
          description: "No relay blocks were observed in the recent watchtower window for node {{ $labels.node }}."

      - alert: KaspaMainnetSyncProgressStalled
        expr: |
          (kaspa_watchtower_sync_active{job="kaspa-watchtower"} == 1)
          and on(job,node) (kaspa_watchtower_sync_baseline_available{job="kaspa-watchtower"} == 1)
          and on(job,node) (kaspa_watchtower_sync_daa_delta{job="kaspa-watchtower"} < 1)
          and on(job,node) (kaspa_watchtower_sync_block_delta{job="kaspa-watchtower"} < 1)
          and on(job,node) (kaspa_watchtower_sync_header_delta{job="kaspa-watchtower"} < 1)
        for: 30m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa mainnet sync progress stalled"
          description: "Mainnet bootstrap sync counters did not advance for node {{ $labels.node }}."

      - alert: KaspaWatchtowerMetricsStale
        expr: time() - timestamp(kaspa_watchtower_status_ok{job="kaspa-watchtower"}) > 180
        for: 2m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower metrics are stale"
          description: "Prometheus sample age is above 180 seconds for node {{ $labels.node }}."

      - alert: KaspaProcessedStatsStale
        expr: (kaspa_watchtower_latest_processed_age_seconds{job="kaspa-watchtower"} > 180) and on(job,node) (kaspa_watchtower_synced{job="kaspa-watchtower"} == 1)
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa processed transaction stats are stale"
          description: "Latest processed block/transaction stats are {{ $value }} seconds old for node {{ $labels.node }}; inspect kaspad processed-stats log output and the watchtower runbook."

      - alert: KaspaWatchtowerRecoveryUnavailable
        expr: increase(kaspa_watchtower_recovery_unavailable_total{job="kaspa-watchtower"}[30m]) > 0
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower recovery was unavailable"
          description: "A recovery request could not run for node {{ $labels.node }}."

      - alert: KaspaWatchtowerRecoveryCommandFailed
        expr: kaspa_watchtower_recovery_last_exit_code{job="kaspa-watchtower"} != 0
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower recovery command failed"
          description: "The latest recovery command returned a non-zero exit code for node {{ $labels.node }}."

      - alert: KaspaMarketPositioningRiskHigh
        expr: kaspa_watchtower_market_positioning_risk_score{job="kaspa-watchtower"} >= 4
        for: 10m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa market positioning risk is high"
          description: "Market positioning risk score is {{ $value }} for {{ $labels.source }} on node {{ $labels.node }}."

      - alert: KaspaWatchtowerMultiNodeCritical
        expr: kaspa_watchtower_multi_node_verdict_value{job="kaspa-watchtower"} >= 2
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower multi-node verdict is critical"
          description: "Multi-node comparison is critical for watchtower node {{ $labels.node }}."

      - alert: KaspaWatchtowerMultiNodeWarning
        expr: kaspa_watchtower_multi_node_verdict_value{job="kaspa-watchtower"} == 1
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower multi-node verdict is warning"
          description: "Multi-node comparison is warning for watchtower node {{ $labels.node }}."

      - alert: KaspaWatchtowerMultiNodeRiskNodes
        expr: kaspa_watchtower_multi_node_risk_nodes{job="kaspa-watchtower"} > 0
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower multi-node risk nodes detected"
          description: "{{ $value }} multi-node history nodes have risk flags for watchtower node {{ $labels.node }}."

      - alert: KaspaWatchtowerMultiNodeLagging
        expr: kaspa_watchtower_multi_node_lagging_nodes{job="kaspa-watchtower"} > 0
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watchtower multi-node lag detected"
          description: "{{ $value }} multi-node history nodes are lagging for watchtower node {{ $labels.node }}."

      - alert: KaspaWatchtowerMultiNodeNoPeers
        expr: kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",flag="no_peers"} > 0
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa multi-node comparison found a node with no peers"
          description: "History node {{ $labels.history_node }} on {{ $labels.network }} has no peers."

      - alert: KaspaWatchtowerMultiNodeStale
        expr: kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",flag="stale_node"} > 0
        for: 10m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa multi-node comparison found stale node history"
          description: "History node {{ $labels.history_node }} on {{ $labels.network }} has stale check history."

      - alert: KaspaWatchtowerMultiNodeChainLag
        expr: kaspa_watchtower_multi_node_flag{job="kaspa-watchtower",flag=~"daa_lag|block_lag"} > 0
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa multi-node comparison found DAA or block lag"
          description: "History node {{ $labels.history_node }} on {{ $labels.network }} is lagging by flag {{ $labels.flag }}."

      - alert: KaspaIndexerApiDown
        expr: (kaspa_watchtower_indexer_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_indexer_health_ok{job="kaspa-watchtower"} == 0)
        for: 2m
        labels:
          severity: critical
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa indexer API is unavailable"
          description: "Watchtower cannot read the configured indexer health endpoint for node {{ $labels.node }}."

      - alert: KaspaIndexerMetricsUnavailable
        expr: (kaspa_watchtower_indexer_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_indexer_metrics_ok{job="kaspa-watchtower"} == 0)
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa indexer metrics are unavailable"
          description: "Watchtower cannot read indexer metrics for node {{ $labels.node }}."

      - alert: KaspaIndexerLagHigh
        expr: kaspa_watchtower_indexer_lag_seconds{job="kaspa-watchtower"} > 60
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa indexer lag is high"
          description: "Indexer lag is {{ $value }} seconds for node {{ $labels.node }}."

      - alert: KaspaIndexerCheckpointStale
        expr: kaspa_watchtower_indexer_checkpoint_age_seconds{job="kaspa-watchtower"} > 300
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa indexer checkpoint is stale"
          description: "Indexer checkpoint age is {{ $value }} seconds for node {{ $labels.node }}."

      - alert: KaspaIndexerWatchlistUnavailable
        expr: (kaspa_watchtower_indexer_watch_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_indexer_watch_ok{job="kaspa-watchtower"} == 0)
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa indexer watchlist is unavailable"
          description: "Watchtower could not poll one or more configured indexer watch addresses for node {{ $labels.node }}."

      - alert: KaspaWatchReadinessNotReady
        expr: (kaspa_watchtower_indexer_watch_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_watch_readiness_ok{job="kaspa-watchtower"} == 0)
        for: 2m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa watch readiness is not ready"
          description: "Watch readiness is not ready for node {{ $labels.node }}; run make discord-watch-check."

      - alert: KaspaSdkSubscriptionUnavailable
        expr: (kaspa_watchtower_sdk_subscription_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_sdk_subscription_ok{job="kaspa-watchtower"} == 0)
        for: 2m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa SDK subscription collector is unavailable"
          description: "Watchtower could not collect SDK subscription events for node {{ $labels.node }}."

      - alert: KaspaSdkSubscriptionNoEvents
        expr: (kaspa_watchtower_sdk_subscription_enabled{job="kaspa-watchtower"} == 1) and on(job,node) (kaspa_watchtower_sdk_subscription_events_total{job="kaspa-watchtower"} < 1)
        for: 5m
        labels:
          severity: warning
          service: kaspa-watchtower
        annotations:
          summary: "Kaspa SDK subscription collector saw no events"
          description: "SDK subscription collector saw no live block, virtual-chain, DAA, or UTXO events for node {{ $labels.node }}."
