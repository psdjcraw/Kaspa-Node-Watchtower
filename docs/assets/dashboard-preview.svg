<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Kaspa Node Watchtower dashboard preview</title>
  <desc id="desc">Static preview of the status-first operator dashboard with verdict, triage, command center, charts, and node context.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2933" flood-opacity="0.09"/>
    </filter>
    <style>
      .page { fill: #f5f7f8; }
      .panel { fill: #ffffff; stroke: #d9e1e8; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .soft { fill: #e8f5ee; stroke: #b9e3ca; stroke-width: 1.2; rx: 8; }
      .muted-panel { fill: #f8fafc; stroke: #edf1f6; stroke-width: 1.2; rx: 8; }
      .title { fill: #1f2933; font: 800 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h2 { fill: #1f2933; font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { fill: #66727f; font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { fill: #66727f; font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .value { fill: #1f2933; font: 800 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { fill: #1f2933; font: 800 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
      .ok { fill: #147a46; }
      .accent { fill: #276b74; }
      .warn { fill: #a86400; }
      .critical { fill: #b42318; }
      .line-ok { fill: none; stroke: #147a46; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .line-blue { fill: none; stroke: #3858e9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .line-warn { fill: none; stroke: #b26a00; stroke-width: 4; stroke-linecap: round; }
      .bar-bg { fill: #e7ecef; rx: 5; }
      .badge-text { fill: #ffffff; font: 800 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="page" width="1200" height="720"/>

  <g transform="translate(64 36)">
    <rect class="panel" x="0" y="0" width="1072" height="114"/>
    <text class="title" x="20" y="40">Kaspa Node Watchtower</text>
    <text class="small" x="20" y="68">kaspa-mainnet-local · checked at 2026-06-06T17:40:00+09:00 · auto-refresh 60s</text>
    <rect class="ok" x="958" y="20" width="92" height="30" rx="15"/>
    <text class="badge-text" x="990" y="40">OK</text>
    <text class="label" x="20" y="92">checks passing</text>
    <text class="label" x="560" y="92">benchmark OK ratio</text>
    <rect class="bar-bg" x="130" y="82" width="390" height="10"/>
    <rect class="ok" x="130" y="82" width="390" height="10" rx="5"/>
    <rect class="bar-bg" x="710" y="82" width="340" height="10"/>
    <rect class="accent" x="710" y="82" width="340" height="10" rx="5"/>
  </g>

  <g transform="translate(64 168)">
    <rect class="panel" x="0" y="0" width="1072" height="92"/>
    <rect class="ok" x="0" y="0" width="6" height="92" rx="3"/>
    <text class="label" x="20" y="30">OPERATOR VERDICT</text>
    <text class="value" x="20" y="62">OK</text>
    <text class="small" x="94" y="58">No immediate action</text>
    <rect class="muted-panel" x="620" y="18" width="132" height="56"/>
    <rect class="muted-panel" x="768" y="18" width="132" height="56"/>
    <rect class="muted-panel" x="916" y="18" width="132" height="56"/>
    <text class="small" x="636" y="42">Failed</text>
    <text class="h2" x="636" y="62">None</text>
    <text class="small" x="784" y="42">Network</text>
    <text class="h2" x="784" y="62">mainnet</text>
    <text class="small" x="932" y="42">Recovery</text>
    <text class="h2" x="932" y="62">none</text>
  </g>

  <g transform="translate(64 280)">
    <rect class="soft" x="0" y="0" width="168" height="82"/>
    <rect class="soft" x="180" y="0" width="168" height="82"/>
    <rect class="soft" x="360" y="0" width="168" height="82"/>
    <rect class="panel" x="540" y="0" width="168" height="82"/>
    <rect class="soft" x="720" y="0" width="168" height="82"/>
    <rect class="soft" x="900" y="0" width="172" height="82"/>
    <text class="label" x="14" y="28">Peers</text>
    <text class="value" x="14" y="58">8</text>
    <text class="label" x="194" y="28">Relay</text>
    <text class="value" x="194" y="58">1.2s</text>
    <text class="label" x="374" y="28">Sync</text>
    <text class="value" x="374" y="58">synced</text>
    <text class="label" x="554" y="28">DAA Score</text>
    <text class="value" x="554" y="58">453.16M</text>
    <text class="label" x="734" y="28">Disk Free</text>
    <text class="value" x="734" y="58">159 GiB</text>
    <text class="label" x="914" y="28">Benchmark OK</text>
    <text class="value" x="914" y="58">100%</text>
  </g>

  <g transform="translate(64 382)">
    <rect class="panel" x="0" y="0" width="254" height="132"/>
    <rect class="panel" x="274" y="0" width="254" height="132"/>
    <rect class="panel" x="548" y="0" width="254" height="132"/>
    <rect class="panel" x="822" y="0" width="250" height="132"/>
    <text class="h2" x="16" y="30">Relay Activity</text>
    <text class="h2" x="206" y="30">6.0K</text>
    <path class="line-ok" d="M24 88 L44 58 L64 76 L84 50 L104 68 L124 56 L144 96 L164 48 L184 82 L204 58 L230 66"/>
    <text class="h2" x="290" y="30">DAA Score</text>
    <text class="h2" x="438" y="30">453.16M</text>
    <path class="line-blue" d="M298 92 C342 86, 378 76, 418 62 S484 42, 510 38"/>
    <text class="h2" x="564" y="30">Peer Floor</text>
    <text class="h2" x="758" y="30">8</text>
    <path class="line-warn" d="M574 88 L780 88"/>
    <text class="h2" x="838" y="30">Severity Timeline</text>
    <text class="h2" x="1032" y="30">OK</text>
    <g transform="translate(844 54)">
      <rect class="muted-panel" x="0" y="0" width="214" height="60"/>
      <g transform="translate(10 10)">
        <rect class="ok" x="0" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="10" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="20" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="30" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="40" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="50" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="60" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="70" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="80" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="90" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="100" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="110" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="120" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="130" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="140" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="150" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="160" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="170" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="180" y="0" width="4" height="40" rx="2"/>
        <rect class="ok" x="190" y="0" width="4" height="40" rx="2"/>
      </g>
    </g>
  </g>

  <g transform="translate(64 534)">
    <rect class="panel" x="0" y="0" width="548" height="82"/>
    <text class="h2" x="16" y="28">Triage Queue</text>
    <rect class="soft" x="16" y="42" width="516" height="26"/>
    <text class="small" x="28" y="60">No active triage items · all latest checks passed</text>
    <rect class="panel" x="572" y="0" width="500" height="82"/>
    <text class="h2" x="588" y="28">Run Context</text>
    <rect class="muted-panel" x="588" y="42" width="110" height="26"/>
    <rect class="muted-panel" x="710" y="42" width="110" height="26"/>
    <rect class="muted-panel" x="832" y="42" width="110" height="26"/>
    <text class="small" x="604" y="60">latest 1.2s</text>
    <text class="small" x="726" y="60">manual</text>
    <text class="small" x="848" y="60">mainnet</text>
  </g>

  <g transform="translate(64 634)">
    <rect class="panel" x="0" y="0" width="1072" height="58"/>
    <text class="h2" x="16" y="34">Command Center</text>
    <rect class="muted-panel" x="196" y="14" width="156" height="30"/>
    <rect class="muted-panel" x="368" y="14" width="184" height="30"/>
    <rect class="muted-panel" x="568" y="14" width="210" height="30"/>
    <rect class="muted-panel" x="794" y="14" width="136" height="30"/>
    <text class="mono" x="212" y="34">make summary</text>
    <text class="mono" x="384" y="34">make incident-report</text>
    <text class="mono" x="584" y="34">make diagnostics-archive</text>
    <text class="mono" x="810" y="34">make smoke</text>
    <rect x="954" y="14" width="86" height="30" rx="6" fill="#ffffff" stroke="#d9e1e8"/>
    <text class="h2" x="976" y="35">Copy</text>
  </g>
</svg>
